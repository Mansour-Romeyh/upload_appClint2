name: discounts_app
description: عالم الخصومات - كوبونات وعروض حصرية
publish_to: 'none'
version: 1.0.0+6

environment:
  sdk: ^3.0.0

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  firebase_remote_config: ^6.5.3
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^17.0.0
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.3
  font_awesome_flutter: ^11.0.0
  google_fonts: ^8.0.2
  http: ^1.2.0
  image_picker: ^1.2.1
  motion: ^2.0.2
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  show_up_animation: ^2.1.2
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1

dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/images/Icon 2.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-VariableFont_slnt,wght.ttf
